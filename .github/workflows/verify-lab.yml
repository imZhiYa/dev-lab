name: 🚀 dev-lab 闭门自查持续构建流水线 (全量自动化终极免检版)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      threads:
        description: '指定 JMH 并发压测线程数 (支持网页端表单动态调配)'
        required: true
        default: '1'

jobs:
  build-and-verify-jdk8:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取 dev-lab 完整源码
        uses: actions/checkout@v3

      - name: ☕ 设置 JDK 8 生产级云端验证环境
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: 🟢 1. 动态寻址编译：一键联编 binary-demo 目录下所有 Java 源码
        run: |
          echo "==================== [ 1. 执行 javac 递归寻址字节码全量编译 ] ===================="
          mkdir -p binary-demo/target/classes
          # 核心大招：动态扫描寻址 binary-demo 目录下任意深度文件夹内的 .java 文件并实施合并编译
          # 免除后续新增案例文件时修改配置文件的维护成本
          find binary-demo -name "*.java" | xargs javac -d binary-demo/target/classes

      - name: 🔵 2. 自动化公审：依次加载执行底座二进制实战类库
        run: |
          echo "==================== [ 2.1 载入 BinaryUtils 纯手工推演总线 ] ===================="
          java -cp binary-demo/target/classes com.zhiya.binary.BinaryUtils
          
          echo "==================== [ 2.2 载入 DynamicStateGuard 订单权限状态流转 ] ===================="
          java -cp binary-demo/target/classes com.zhiya.binary.DynamicStateGuard
          
          echo "==================== [ 2.3 载入 LeetCodeBitwiseClassics 力扣极客位操演示 ] ===================="
          java -cp binary-demo/target/classes com.zhiya.binary.LeetCodeBitwiseClassics

          echo "==================== [ 2.4 载入 BloomFilterBitMapGuard 防穿透布隆大闸 ] ===================="
          java -cp binary-demo/target/classes com.zhiya.binary.BloomFilterBitMapGuard
          
          echo "==================== [ 2.5 载入 SnowflakeBitwiseGenerator 雪花算法 ID 合成 ] ===================="
          java -cp binary-demo/target/classes com.zhiya.binary.SnowflakeBitwiseGenerator

          echo "==================== [ 2.6 载入 HyperLogLogBitwiseEstimator 亿级去重 ] ===================="
          java -cp binary-demo/target/classes com.zhiya.binary.HyperLogLogBitwiseEstimator
          
          echo "==================== [ 2.7 载入 GeohashBitwiseSpatialIndex 空间交织寻址 ] ===================="
          java -cp binary-demo/target/classes com.zhiya.binary.GeohashBitwiseSpatialIndex

          echo "==================== [ 2.8 载入 ConsistentHashBinaryRing 一致性哈希环 ] ===================="
          java -cp binary-demo/target/classes com.zhiya.binary.ConsistentHashBinaryRing

      - name: 🟠 3. 自动化公审 tree-demo（树结构 & 跳表）
        run: |
          CP=tree-demo/target/classes

          echo "==================== [ 3.1 载入 BST 二叉搜索树 ] ===================="
          java -cp $CP com.zhiya.tree.BST

          echo "==================== [ 3.2 载入 RedBlackBalancedTree 红黑树（泛型版）] ===================="
          java -cp $CP com.zhiya.tree.RedBlackBalancedTree

          echo "==================== [ 3.3 载入 TreeTraversal 非递归遍历 5 种 ] ===================="
          java -cp $CP com.zhiya.tree.TreeTraversal

          echo "==================== [ 3.4 载入 MaxHeap 最大堆 ] ===================="
          java -cp $CP com.zhiya.tree.MaxHeap

          echo "==================== [ 3.5 载入 MinHeap 最小堆 ] ===================="
          java -cp $CP com.zhiya.tree.MinHeap

          echo "==================== [ 3.6 载入 Trie 字典树 ] ===================="
          java -cp $CP com.zhiya.tree.Trie

          echo "==================== [ 3.7 载入 BTree B 树 ] ===================="
          java -cp $CP com.zhiya.tree.BTree

          echo "==================== [ 3.8 载入 BPlusTree B+ 树 ] ===================="
          java -cp $CP com.zhiya.tree.BPlusTree

          echo "==================== [ 3.9 载入 SkipList 无锁并发跳表 CAS 推演 ] ===================="
          java -cp $CP com.zhiya.tree.SkipList

      - name: 🟣 3. 基准沙盘打包：构建 BitwiseBenchmark 独立公审镜像
        run: |
          echo "==================== [ 3. 执行 Maven 打包构建 ] ===================="
          cd benchmarks
          mvn clean package -DskipTests
          echo "✅ 基准压测独立镜像在 JDK 8 下构建成功！包体存放于: benchmarks/target/benchmarks.jar"

      - name: 🟡 4. 终极验证：启动 JMH 纳秒级微观基准跑分 (支持动态控制流)
        run: |
          echo "==================== [ 4. 拉起 JMH 纳秒级跑分比对 ] ===================="
          # 动态获取 workflow_dispatch 传入的线程数，若通过 push 自动触发则默认采用单线程 (1)
          # 参数规约：-wi 1(预热1轮) -i 3(测量3轮) -f 1(独立分叉1次) -t 动态传参
          java -jar benchmarks/target/benchmarks.jar -wi 1 -i 3 -f 1 -t ${{ github.event.inputs.threads || 1 }}
