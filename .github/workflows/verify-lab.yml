name: 🚀 dev-lab 闭门自查持续构建流水线 (JDK 8 生产纯享版)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-verify-jdk8:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取 dev-lab 完整源码
        uses: actions/checkout@v3

      - name: ☕ 设置 JDK 8 生产级云端验证环境
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: 🟢 1. 正统编译与单点验证：执行 BinaryUtils 纯手工转换工具
        run: |
          echo "==================== [ 1. 执行 javac 原生字节码编译 ] ===================="
          mkdir -p binary-demo/target/classes
          javac -d binary-demo/target/classes binary-demo/src/main/java/com/zhiya/binary/BinaryUtils.java
          
          echo "==================== [ 2. 载入 JVM 主类推演二进制实态 ] ===================="
          java -cp binary-demo/target/classes com.zhiya.binary.BinaryUtils

      - name: 🔵 2. 构建与压测打包：编译 BitwiseBenchmark 基准测试包体
        run: |
          echo "==================== [ BitwiseBenchmark JDK 8 编译包体查验 ] ===================="
          cd benchmarks
          mvn clean package -DskipTests
          echo "✅ 基准压测独立镜像在 JDK 8 下构建成功！包体存放于: benchmarks/target/benchmarks.jar"

      - name: 🟣 3. 终极验证：拉起 JMH 执行云端真实基准压测
        run: |
          echo "==================== [ 3. 启动 JMH 纳秒级跑分比对 ] ===================="
          # 传递极速压测指令：-wi 1(预热1轮) -i 3(测量3轮) -f 1(独立分叉1次) -t 1(单线程)
          java -jar benchmarks/target/benchmarks.jar -wi 1 -i 3 -f 1 -t 1
